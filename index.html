<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Agro Forte</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- HEADER -->

  <header class="header">

    <div class="logo">
      🌱 Agro <span>Forte</span>
    </div>

    <nav class="nav">
      <a href="#">Início</a>
      <a href="#">Diferenciais</a>
      <a href="#">Impacto</a>
    </nav>

    <button class="contact-btn">
      Contato
    </button>

  </header>

  <!-- HERO -->

  <section class="hero">

    <div class="overlay"></div>

    <div class="hero-content">

      <div class="tag">
        O Futuro do Campo é Tech
      </div>

      <h1>
        Inovação Inteligente para uma Agricultura
        <span>Sustentável</span>
      </h1>

      <p>
        Conectamos tecnologia de precisão e manejo regenerativo
        para nutrir o planeta e preservar o amanhã.
      </p>

      <div class="hero-buttons">

        <button class="primary-btn">
          Conhecer Soluções
        </button>

        <button class="secondary-btn">
          Ver Impacto
        </button>

      </div>

    </div>

  </section>

</body>
</html>
